          legend:
            show: true
            position: bottom
            labels:
              colors: "#9e9e9e"
          grid:
            borderColor: "#333333"
            strokeDashArray: 2
          tooltip:
            theme: dark
            x:
              format: "HH:mm"
        series:
          - entity: sensor.haus_verbauch_phase_a_leistung
            name: Phase A
            color: "#e53935"
            type: area
            extend_to: now
          - entity: sensor.haus_verbauch_phase_b_leistung
            name: Phase B
            color: "#fb8c00"
            type: area
            extend_to: now
          - entity: sensor.haus_verbauch_phase_c_leistung
            name: Phase C
            color: "#43a047"
            type: area
            extend_to: now

  # ═══════════════════════════════════════════════════════════
  # VIEW 6: TABELLE (Reports)
  # ═══════════════════════════════════════════════════════════
  - title: Tabelle
    path: reports
    icon: mdi:table
    cards:
      # ── Reihe 1: Autarkie ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Autarkie heute
            secondary: "{{ states('sensor.energy_manager_autarkiegrad_heute') | float(0) | round(1) }} %"
            icon: mdi:shield-sun
            icon_color: >
              {% set a = states('sensor.energy_manager_autarkiegrad_heute') | float(0) %}
              {% if a >= 80 %}green{% elif a >= 50 %}amber{% else %}red{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Autarkie Monat
            secondary: "{{ states('sensor.energy_manager_autarkiegrad_monat') | float(0) | round(1) }} %"
            icon: mdi:shield-sun-outline
            icon_color: >
              {% set a = states('sensor.energy_manager_autarkiegrad_monat') | float(0) %}
              {% if a >= 80 %}green{% elif a >= 50 %}amber{% else %}red{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Autarkie Jahr
            secondary: "{{ states('sensor.energy_manager_autarkiegrad_jahr') | float(0) | round(1) }} %"
            icon: mdi:shield-check
            icon_color: >
              {% set a = states('sensor.energy_manager_autarkiegrad_jahr') | float(0) %}
              {% if a >= 80 %}green{% elif a >= 50 %}amber{% else %}red{% endif %}
            layout: vertical

      # ── Reihe 2: Eigenverbrauch ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Eigenverbrauch heute
            secondary: "{{ states('sensor.energy_manager_eigenverbrauchsquote_heute') | float(0) | round(1) }} %"
            icon: mdi:home-percent
            icon_color: >
              {% set v = states('sensor.energy_manager_eigenverbrauchsquote_heute') | float(0) %}
              {% if v >= 60 %}green{% elif v >= 30 %}amber{% else %}red{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Eigenverbrauch Monat
            secondary: "{{ states('sensor.energy_manager_eigenverbrauchsquote_monat') | float(0) | round(1) }} %"
            icon: mdi:home-percent-outline
            icon_color: >
              {% set v = states('sensor.energy_manager_eigenverbrauchsquote_monat') | float(0) %}
              {% if v >= 60 %}green{% elif v >= 30 %}amber{% else %}red{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Eigenverbrauch Jahr
            secondary: "{{ states('sensor.energy_manager_eigenverbrauchsquote_jahr') | float(0) | round(1) }} %"
            icon: mdi:home-check
            icon_color: >
              {% set v = states('sensor.energy_manager_eigenverbrauchsquote_jahr') | float(0) %}
              {% if v >= 60 %}green{% elif v >= 30 %}amber{% else %}red{% endif %}
            layout: vertical

      # ── Reihe 3: PV-Produktion Grafik (kumuliert) ──
      - type: statistics-graph
        title: PV-Produktion Monatsübersicht
        entities:
          - entity: sensor.energy_manager_pv_produktion_monat_kwh
            name: PV Produktion
          - entity: sensor.energy_manager_einspeisung_monat_kwh
            name: Netz Rückspeisung
          - entity: sensor.energy_manager_eigenverbrauch_monat_kwh
            name: Eigenverbrauch
        days_to_show: 365
        chart_type: bar
        stat_types:
          - max

      # ── Reihe 4: Verbrauch Grafik ──
      - type: statistics-graph
        title: Verbrauch Monatsübersicht
        entities:
          - entity: sensor.energy_manager_hausverbrauch_monat_kwh
            name: Hausverbrauch
          - entity: sensor.energy_manager_wp_monat_kwh
            name: WP-Verbrauch
          - entity: sensor.boiler_energie_monat_total
            name: Boiler Verbrauch
        days_to_show: 365
        chart_type: bar
        stat_types:
          - max

