              - 0.4
              - 0
              - 0
          yaxis:
            - seriesName: WW-oben
              min: 45
              max: 65
              tickAmount: 4
              title:
                text: "WW-oben °C"
                style:
                  color: "#ef5350"
                  fontSize: "11px"
              labels:
                style:
                  colors: "#ef5350"
                  fontSize: "11px"
