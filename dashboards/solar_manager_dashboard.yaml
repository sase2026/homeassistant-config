  # ═══════════════════════════════════════════════════════════
  # VIEW 4: BOILER PV-Überschuss
  # ═══════════════════════════════════════════════════════════
  - title: Boiler
    path: boiler
    icon: mdi:water-boiler
    cards:
      # ── Reihe 1: WW-oben | PV-Laden W | Netz-Laden W ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: WW-oben °C
            secondary: "{{ states('sensor.ww_mitte_rl_ist_ww_oben_temperatur_3') | float(0) | round(1) }} °C"
            icon: mdi:water-thermometer
            icon_color: >
              {% set t = states('sensor.ww_mitte_rl_ist_ww_oben_temperatur_3') | float(0) %}
              {% if t >= 60 %}red{% elif t >= 48 %}orange{% else %}blue{% endif %}
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: PV-Laden W
            secondary: "{{ states('sensor.boiler_pv_ladeleistung') | int }} W"
            icon: mdi:solar-power
            icon_color: amber
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Netz-Laden W
            secondary: "{{ states('sensor.boiler_netz_ladeleistung') | int }} W"
            icon: mdi:transmission-tower
            icon_color: red
            layout: vertical

      # ── Reihe 2: Boiler Relais ──
      - type: custom:mushroom-entity-card
        entity: switch.boiler_relais
        name: Boiler Relais

      # ── Reihe 3: Tages-Energie kWh | PV-Energie kWh | Netz-Energie kWh ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Tages-Energie kWh
            secondary: "{{ states('sensor.boiler_energie_heute_total') | float(0) | round(2) }} kWh"
            icon: mdi:calendar-today
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: PV-Energie kWh
            secondary: "{{ states('sensor.boiler_pv_energie_heute') | float(0) | round(2) }} kWh"
            icon: mdi:solar-power
            icon_color: amber
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Netz-Energie kWh
            secondary: "{{ states('sensor.boiler_netz_energie_heute') | float(0) | round(2) }} kWh"
            icon: mdi:transmission-tower-import
            icon_color: red
            layout: vertical

      # ── Reihe 4: Energie Monat | PV-Energie Monat | Netz Monat ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Energie Monat kWh
            secondary: "{{ states('sensor.boiler_energie_monat_total') | float(0) | round(1) }} kWh"
            icon: mdi:calendar-month
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: PV-Energie Monat kWh
            secondary: "{{ states('sensor.boiler_pv_energie_monat') | float(0) | round(1) }} kWh"
            icon: mdi:solar-power
            icon_color: amber
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Netz Monat kWh
            secondary: "{{ states('sensor.boiler_netz_energie_monat') | float(0) | round(1) }} kWh"
            icon: mdi:transmission-tower-import
            icon_color: red
            layout: vertical

      # ── Grafik: Boiler Temperatur ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: Boiler Temperatur - letzte 24h
          show_states: true
          colorize_states: true
        graph_span: 24h
        now:
          show: true
          label: Jetzt
          color: "#ffffff"
        update_interval: 60s
        apex_config:
          chart:
            type: area
            height: 250
            toolbar:
              show: false
            animations:
              enabled: false
          stroke:
            curve: smooth
            width:
              - 1.0
              - 1.0
              - 1.0
              - 1.0
            type:
              - gradient
            opacity:
              - 0.5
          yaxis:
            min: 30
            max: 80
            labels:
              style:
                colors: "#9e9e9e"
                fontSize: "11px"
              formatter: |
                EVAL:function(val) { return val.toFixed(0) + ' °C'; }
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              style:
                colors: "#9e9e9e"
          legend:
            show: true
            position: bottom
            labels:
              colors: "#9e9e9e"
          grid:
            borderColor: "#333333"
            strokeDashArray: 2
          tooltip:
            theme: dark
            x:
              format: "HH:mm"
        series:
          - entity: sensor.ww_mitte_rl_ist_ww_oben_temperatur_3
            name: WW-oben °C
            color: "#ef5350"
            type: area
            extend_to: now

      # ── Grafik: Boiler PV Laden vs Netz Laden ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: Boiler Ladeleistung - PV vs Netz
          show_states: true
          colorize_states: true
        graph_span: 24h
        now:
          show: true
          label: Jetzt
          color: "#ffffff"
        update_interval: 60s
        apex_config:
          chart:
            type: area
            height: 250
            toolbar:
              show: false
            animations:
              enabled: false
          stroke:
            curve: smooth
            width:
              - 1.0
              - 1.0
              - 1.0
              - 1.0
              - gradient
              - gradient
            opacity:
              - 0.7
              - 0.7
          yaxis:
            min: 0
            labels:
              style:
                colors: "#9e9e9e"
                fontSize: "11px"
              formatter: |
                EVAL:function(val) {
                  if (Math.abs(val) >= 1000) return (val/1000).toFixed(1) + ' kW';
                  return val.toFixed(0) + ' W';
                }
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              style:
                colors: "#9e9e9e"
          legend:
            show: true
            position: bottom
            labels:
              colors: "#9e9e9e"
          grid:
            borderColor: "#333333"
            strokeDashArray: 2
          tooltip:
            theme: dark
            x:
              format: "HH:mm"
        series:
          - entity: sensor.boiler_pv_ladeleistung
            name: PV Laden W
            color: "#ff9800"
            type: area
            extend_to: now
          - entity: sensor.boiler_netz_ladeleistung
            name: Netz Laden W
            color: "#ef5350"
            type: area
            extend_to: now

      # ── Boiler Steuerparameter ──
      - type: entities
        title: Boiler Steuerparameter
        entities:
          - entity: input_number.boiler_nacht_starttemperatur
          - entity: input_number.boiler_pv_starttemperatur
          - entity: input_number.boiler_pv_stopptemperatur

  # ═══════════════════════════════════════════════════════════
  # VIEW 5: NETZ
  # ═══════════════════════════════════════════════════════════
  - title: Netz
    path: netz
    icon: mdi:transmission-tower
    cards:
      # ── Reihe 1 ──
      - type: horizontal-stack
