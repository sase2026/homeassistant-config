                  EVAL:function(val) { return val.toFixed(1) + ' °C'; }
            - seriesName: Vorlauf HK-II
              opposite: true
              min: 18
              max: 50
              tickAmount: 4
              title:
                text: "HK-II °C"
                style:
                  color: "#9e9e9e"
                  fontSize: "11px"
              labels:
                style:
                  colors: "#9e9e9e"
                  fontSize: "11px"
                formatter: |
                  EVAL:function(val) { return val.toFixed(1) + ' °C'; }
            - seriesName: Rücklauf HK-II
              opposite: true
              show: false
              min: 18
              max: 50
