title: Solar Manager
icon: mdi:solar-power-variant
views:

  # ═══════════════════════════════════════════════════════════
  # VIEW 1: ÜBERSICHT
  # ═══════════════════════════════════════════════════════════
  - title: Übersicht
    path: uebersicht
    icon: mdi:home-lightning-bolt
    badges: []
    cards:
      # ── EBENE 1: PV Produktion | Hausverbrauch | WP-Verbrauch ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: PV Produktion
            secondary: "{{ states('sensor.energy_manager_pv_aktuell_w') | int }} W"
            icon: mdi:solar-power-variant
            icon_color: amber
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: Hausverbrauch
            secondary: "{{ states('sensor.energy_manager_hausverbrauch_aktuell_w') | int }} W"
            icon: mdi:home-lightning-bolt
            icon_color: blue
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: WP-Verbrauch
            secondary: "{{ states('sensor.energy_manager_wp_aktuell_w') | int }} W"
            icon: mdi:heat-pump
            icon_color: cyan
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(6,182,212,0.08); border: 1px solid rgba(6,182,212,0.3); border-radius: 16px; }\n"

      # ── EBENE 2: Netz | Einspeisung kWh | Netzbezug kWh ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Netz
            secondary: >
              {% set netz = states('sensor.energy_manager_netz_aktuell_w') | float(0) %}
              {% if netz < 0 %}▲ {{ (netz * -1) | int }} W Einspeisung
              {% elif netz > 0 %}▼ {{ netz | int }} W Bezug
              {% else %}≈ 0 W{% endif %}
            icon: mdi:transmission-tower
            icon_color: >
              {% if states('sensor.energy_manager_netz_aktuell_w') | float(0) < 0 %}green{% else %}red{% endif %}
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: Einspeisung heute
            secondary: "{{ states('sensor.energy_manager_einspeisung_heute_kwh_2') | float(0) | round(2) }} kWh"
            icon: mdi:transmission-tower-export
            icon_color: green
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: Netzbezug heute
            secondary: "{{ states('sensor.energy_manager_netzbezug_heute_kwh') | float(0) | round(2) }} kWh"
            icon: mdi:transmission-tower-import
            icon_color: red
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 16px; }\n"

      # ── EBENE 3: Autarkie % | Eigenverbrauch % | PV heute kWh ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Autarkie
            secondary: "{{ states('sensor.energy_manager_autarkiegrad_heute') | float(0) | round(1) }} %"
            icon: mdi:shield-sun
            icon_color: >
              {% set a = states('sensor.energy_manager_autarkiegrad_heute') | float(0) %}
              {% if a >= 80 %}green{% elif a >= 50 %}amber{% else %}red{% endif %}
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: Eigenverbrauch
            secondary: "{{ states('sensor.energy_manager_eigenverbrauchsquote_heute') | float(0) | round(1) }} %"
            icon: mdi:home-percent
            icon_color: >
              {% set v = states('sensor.energy_manager_eigenverbrauchsquote_heute') | float(0) %}
              {% if v >= 60 %}green{% elif v >= 30 %}amber{% else %}red{% endif %}
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: PV heute
            secondary: "{{ states('sensor.energy_manager_pv_produktion_heute_kwh') | float(0) | round(2) }} kWh"
            icon: mdi:solar-power
            icon_color: amber
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); border-radius: 16px; }\n"

      # ── EBENE 4: Boilertemperatur ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Boilertemperatur °C
            secondary: "{{ states('sensor.boiler_temperatur_oben') | float(0) | round(1) }} °C"
            icon: mdi:water-thermometer
            icon_color: >
              {% set t = states('sensor.boiler_temperatur_oben') | float(0) %}
              {% if t >= 60 %}red{% elif t >= 48 %}orange{% else %}blue{% endif %}
            layout: vertical
            card_mod:
      - type: custom:button-card
        name: "Autarkie % / Netzbezug"
        show_name: true
        show_icon: false
        show_label: true
        styles:
          card:
            - padding: 12px 16px
            - background: "var(--ha-card-background, var(--card-background-color, #fff))"
            - border-radius: 12px
          name:
            - font-size: 13px
            - color: "var(--primary-text-color)"
            - margin-bottom: 8px
            - text-align: left
          label:
            - width: 100%
            - padding: 0
        label: |
          [[[
            const a = parseFloat(states['sensor.energy_manager_autarkiegrad_heute'].state) || 0;
            const n = Math.max(0, 100 - a);
            return `
              <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px">
                <span style="color:#f59e0b">Autarkie ${a.toFixed(1)} %</span>
                <span style="color:#ef4444">Netzbezug ${n.toFixed(1)} %</span>
              </div>
              <div style="display:flex;width:100%;height:20px;border-radius:10px;overflow:hidden;background:#ef4444">
                <div style="width:${a}%;background:#f59e0b;border-radius:10px 0 0 10px;min-width:${a>0?4:0}px"></div>
              </div>
            `;
          ]]]
      - type: custom:button-card
        name: "Eigenverbrauch % / PV-Überschuss"
        show_name: true
        show_icon: false
        show_label: true
        styles:
          card:
            - padding: 12px 16px
            - background: "var(--ha-card-background, var(--card-background-color, #fff))"
            - border-radius: 12px
          name:
            - font-size: 13px
            - color: "var(--primary-text-color)"
            - margin-bottom: 8px
            - text-align: left
          label:
            - width: 100%
            - padding: 0
        label: |
          [[[
            const e = parseFloat(states['sensor.energy_manager_eigenverbrauchsquote_heute'].state) || 0;
            const r = Math.max(0, 100 - e);
            return `
              <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px">
                <span style="color:#22c55e">Eigenverbrauch ${e.toFixed(1)} %</span>
                <span style="color:#6b7280">PV-Überschuss ${r.toFixed(1)} %</span>
              </div>
              <div style="display:flex;width:100%;height:20px;border-radius:10px;overflow:hidden;background:#374151">
                <div style="width:${e}%;background:#22c55e;border-radius:10px 0 0 10px;min-width:${e>0?4:0}px"></div>
              </div>
            `;
          ]]]

      - type: custom:apexcharts-card
        header:
          show: true
          title: Übersicht
          show_states: true
          colorize_states: true
        graph_span: 1d
        span:
          start: day
        now:
          show: true
          label: Jetzt
          color: "#ffffff"
        update_interval: 60s
        apex_config:
          chart:
            type: area
            height: 300
            toolbar:
              show: false
            animations:
              enabled: false
          dataLabels:
            enabled: false
          stroke:
            curve: smooth
            width:
              - 0.8
              - 0.8
              - 0.8
              - 0.8
            dashArray:
              - 0
              - 6
              - 6
              - 0
          fill:
            type:
              - gradient
              - gradient
              - gradient
              - gradient
            opacity:
              - 0.8
              - 0.5
              - 0.4
              - 0.7
            gradient:
              shade: dark
              type: vertical
              opacityFrom: 0.6
              opacityTo: 0.05
          yaxis:
            min: -4000
            max: 7000
            tickAmount: 22
            decimalsInFloat: 0
            labels:
              style:
                colors: "#9e9e9e"
                fontSize: "11px"
              formatter: |
                EVAL:function(val) {
                  if (val % 1000 === 0) {
                    if (val === 0) return '0';
                    return (val/1000).toFixed(0) + ' kW';
                  }
                  return '';
                }
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              style:
                colors: "#9e9e9e"
                fontSize: "11px"
          annotations:
            yaxis:
              - y: -4000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "-4 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: -3500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: -3000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "-3 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: -2500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: -2000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "-2 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: -1500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: -1000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "-1 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: -500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 1000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "1 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: 1500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 2000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "2 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: 2500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 3000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "3 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: 3500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 4000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "4 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: 4500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 5000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "5 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: 5500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 6000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "6 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
              - y: 6500
                borderColor: "#3a3a3a"
                strokeDashArray: 1
                borderWidth: 1
              - y: 7000
                borderColor: "#555555"
                strokeDashArray: 3
                borderWidth: 1
                label:
                  text: "7 kW"
                  position: right
                  style:
                    color: "#666666"
                    fontSize: "10px"
                    background: transparent
          grid:
            borderColor: "#333333"
            strokeDashArray: 0
          tooltip:
            theme: dark
            x:
              format: "HH:mm"
        series:
          - entity: sensor.energy_manager_pv_aktuell_w
            name: PV Produktion
            color: "#ff9800"
            type: area
            extend_to: now
          - entity: sensor.energy_manager_hausverbrauch_aktuell_w
            name: Hausverbrauch
            color: "#1565c0"
            type: line
            extend_to: now
          - entity: sensor.energy_manager_wp_aktuell_w
            name: WP-Verbrauch
            color: "#4dd0e1"
            type: line
            extend_to: now
          - entity: sensor.netzeinspeisung_leistung_w
            name: PV Rueckspeisung
            color: "#7b1fa2"
            type: area
            transform: "return -x;"
            extend_to: now

      # ── Energie Assistent ──
      - type: custom:mushroom-template-card
        primary: Energie-Assistent
        multiline_secondary: true
        icon: mdi:robot-happy
        icon_color: >
          {% set ueberschuss = states('sensor.energy_manager_pv_ueberschuss_aktuell_w') | int %}
          {% set netz = states('sensor.energy_manager_netz_aktuell_w') | float(0) %}
          {% if ueberschuss > 1500 %}green{% elif netz > 2000 %}red{% else %}blue{% endif %}
        secondary: "{{ states('sensor.energy_manager_empfehlung') }}"

      # ── Prognose ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Prognose heute
            secondary: "{{ states('sensor.energy_production_today') | float(0) | round(2) }} kWh"
            icon: mdi:weather-sunny
            icon_color: amber
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Resttag heute
            secondary: "{{ states('sensor.energy_production_today_remaining') | float(0) | round(2) }} kWh"
            icon: mdi:clock-end
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Prognose morgen
            secondary: "{{ states('sensor.energy_production_tomorrow') | float(0) | round(2) }} kWh"
            icon: mdi:weather-partly-cloudy
            icon_color: >
              {% set v = states('sensor.energy_production_tomorrow') | float(0) %}
              {% if v > 12 %}amber{% elif v > 6 %}orange{% else %}blue{% endif %}
            layout: vertical

  # ═══════════════════════════════════════════════════════════
  # VIEW 2: PV
  # ═══════════════════════════════════════════════════════════
  - title: PV
    path: pv
    icon: mdi:solar-power-variant
    cards:
      # ── Reihe 1: PV Produktion | Heute | Gesamtertrag | Einspeisung heute ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: PV Produktion
            secondary: "{{ states('sensor.energy_manager_pv_aktuell_w') | int }} W"
            icon: mdi:solar-power-variant
            icon_color: amber
            layout: vertical
            card_mod:
              style: "ha-card { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); border-radius: 16px; }\n"
          - type: custom:mushroom-template-card
            primary: Heute
            secondary: "{{ states('sensor.energy_manager_pv_produktion_heute_kwh') | float(0) | round(2) }} kWh"
            icon: mdi:calendar-today
            icon_color: amber
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Gesamtertrag
            secondary: "{{ (states('sensor.stp4_0_3av_40_930_total_yield') | float(0) / 1000) | round(1) }} kWh"
            icon: mdi:counter
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Einspeisung heute
            secondary: "{{ states('sensor.energy_manager_einspeisung_heute_kwh_2') | float(0) | round(2) }} kWh"
            icon: mdi:transmission-tower-export
            icon_color: green
            layout: vertical

      # ── Grafik: PV Produktion - letzte 24h ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: PV Produktion - letzte 24 Stunden
          show_states: true
          colorize_states: true
        graph_span: 24h
        now:
          show: true
          label: Jetzt
          color: "#ffffff"
        update_interval: 60s
        apex_config:
          chart:
            type: area
            height: 300
            toolbar:
              show: false
            animations:
              enabled: false
          stroke:
            curve: smooth
            width:
              - 1.0
              - 1.0
              - 1.0
              - 1.0
              - 0
              - 8
              - 0
          fill:
            type:
              - gradient
              - solid
              - gradient
            opacity:
              - 0.8
              - 0
              - 0.6
          yaxis:
            min: 0
            max: 5000
            tickAmount: 5
            labels:
              style:
                colors: "#9e9e9e"
                fontSize: "11px"
              formatter: |
                EVAL:function(val) {
                  if (Math.abs(val) >= 1000) return (val/1000).toFixed(1) + ' kW';
                  return val.toFixed(0) + ' W';
                }
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              style:
                colors: "#9e9e9e"
          legend:
            show: true
            position: bottom
            labels:
              colors: "#9e9e9e"
          grid:
            borderColor: "#333333"
            strokeDashArray: 2
          tooltip:
            theme: dark
            x:
              format: "HH:mm"
        series:
          - entity: sensor.energy_manager_pv_aktuell_w
            name: PV Produktion
            color: "#ff9800"
            type: area
            extend_to: now
          - entity: sensor.energy_manager_hausverbrauch_aktuell_w
            name: Haus + WP Verbrauch
            color: "#1565c0"
            type: line
            extend_to: now
          - entity: sensor.netzeinspeisung_leistung_w
            name: PV Rückspeisung
            color: "#ff9800"
            type: area
            transform: "return -x;"
            extend_to: now

      # ── Grafik: PV Produktion 3-phasig ──
      - type: custom:apexcharts-card
        header:
          show: true
          title: PV Produktion - 3-phasig heute
          show_states: true
          colorize_states: true
        graph_span: 1d
        span:
          start: day
        now:
          show: true
          label: Jetzt
          color: "#ffffff"
        update_interval: 60s
        apex_config:
          chart:
            type: line
            height: 250
            toolbar:
              show: false
            animations:
              enabled: false
          stroke:
            curve: smooth
            width:
              - 1.0
              - 1.0
              - 1.0
              - 1.0
            labels:
              style:
                colors: "#9e9e9e"
                fontSize: "11px"
              formatter: |
                EVAL:function(val) {
                  if (Math.abs(val) >= 1000) return (val/1000).toFixed(1) + ' kW';
                  return val.toFixed(0) + ' W';
                }
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              style:
                colors: "#9e9e9e"
          legend:
            show: true
            position: bottom
            labels:
              colors: "#9e9e9e"
          grid:
            borderColor: "#333333"
            strokeDashArray: 2
          tooltip:
            theme: dark
            x:
              format: "HH:mm"
        series:
          - entity: sensor.pva_produktion_phase_a_leistung
            name: Phase A
            color: "#ff9800"
            type: line
            extend_to: now
          - entity: sensor.pva_produktion_phase_b_leistung
            name: Phase B
            color: "#ffb74d"
            type: line
            extend_to: now
          - entity: sensor.pva_produktion_phase_c_leistung
            name: Phase C
            color: "#ffe0b2"
            type: line
            extend_to: now

      # ── Autarkie & Eigenverbrauch (2 Reihen für Mobile) ──
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Autarkie heute
            secondary: "{{ states('sensor.energy_manager_autarkiegrad_heute') | float(0) | round(1) }} %"
            icon: mdi:shield-sun
            icon_color: >
              {% set a = states('sensor.energy_manager_autarkiegrad_heute') | float(0) %}
              {% if a >= 80 %}green{% elif a >= 50 %}amber{% else %}red{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Autarkie Monat
            secondary: "{{ states('sensor.energy_manager_autarkiegrad_monat') | float(0) | round(1) }} %"
            icon: mdi:shield-sun-outline
            icon_color: >
              {% set a = states('sensor.energy_manager_autarkiegrad_monat') | float(0) %}
              {% if a >= 80 %}green{% elif a >= 50 %}amber{% else %}red{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Autarkie Jahr
            secondary: "{{ states('sensor.energy_manager_autarkiegrad_jahr') | float(0) | round(1) }} %"
            icon: mdi:shield-check
            icon_color: >
              {% set a = states('sensor.energy_manager_autarkiegrad_jahr') | float(0) %}
              {% if a >= 80 %}green{% elif a >= 50 %}amber{% else %}red{% endif %}
            layout: vertical

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Eigenverbrauch heute
            secondary: "{{ states('sensor.energy_manager_eigenverbrauchsquote_heute') | float(0) | round(1) }} %"
            icon: mdi:home-percent
            icon_color: >
              {% set v = states('sensor.energy_manager_eigenverbrauchsquote_heute') | float(0) %}
              {% if v >= 60 %}green{% elif v >= 30 %}amber{% else %}red{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Eigenverbrauch Monat
            secondary: "{{ states('sensor.energy_manager_eigenverbrauchsquote_monat') | float(0) | round(1) }} %"
            icon: mdi:home-percent-outline
            icon_color: >
              {% set v = states('sensor.energy_manager_eigenverbrauchsquote_monat') | float(0) %}
              {% if v >= 60 %}green{% elif v >= 30 %}amber{% else %}red{% endif %}
