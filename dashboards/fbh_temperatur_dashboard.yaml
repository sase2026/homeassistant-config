title: FBH Heizungsraum
icon: mdi:thermometer-lines
views:

  # ═══════════════════════════════════════════════════════════
  # VIEW 1: ÜBERSICHT FBH
  # ═══════════════════════════════════════════════════════════
  - title: FBH Übersicht
    path: fbh-uebersicht
    icon: mdi:thermometer-lines
    cards:

      # ── Heizkreis Status oben ──────────────────────────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: WW Oben
            secondary: "{{ states('sensor.ww_mitte_rl_ist_ww_oben_temperatur_3') | float(0) | round(1) }} °C"
            icon: mdi:water-thermometer
            icon_color: >
              {% set t = states('sensor.ww_mitte_rl_ist_ww_oben_temperatur_3') | float(0) %}
              {% if t >= 55 %}red{% elif t >= 45 %}orange{% else %}blue{% endif %}
            layout: vertical
            card_mod:
              style: "ha-card { border-left: 3px solid #ef4444; }"
          - type: custom:mushroom-template-card
            primary: WW Mitte
            secondary: "{{ states('sensor.ww_mitte_rl_ist_ww_oben_temperatur') | float(0) | round(1) }} °C"
            icon: mdi:thermometer-water
            icon_color: >
              {% set t = states('sensor.ww_mitte_rl_ist_ww_oben_temperatur') | float(0) %}
              {% if t >= 50 %}red{% elif t >= 40 %}orange{% else %}blue{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: RL Ist
            secondary: "{{ states('sensor.ww_mitte_rl_ist_ww_oben_temperatur_2') | float(0) | round(1) }} °C"
            icon: mdi:thermometer-chevron-down
            icon_color: blue
            layout: vertical
          - type: custom:mushroom-template-card
            primary: VL HK-II
            secondary: "{{ states('sensor.16_waku_rl_hk_ii_vl_hk_ii_temperatur_3') | float(0) | round(1) }} °C"
            icon: mdi:thermometer-chevron-up
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: RL HK-II
            secondary: "{{ states('sensor.16_waku_rl_hk_ii_vl_hk_ii_temperatur_2') | float(0) | round(1) }} °C"
            icon: mdi:thermometer-chevron-down
            icon_color: cyan
            layout: vertical
          - type: custom:mushroom-template-card
            primary: WaKü
            secondary: "{{ states('sensor.16_waku_rl_hk_ii_vl_hk_ii_temperatur') | float(0) | round(1) }} °C"
            icon: mdi:water-pump
            icon_color: blue
            layout: vertical

      # ── FBH Räume Grid ────────────────────────────────────
