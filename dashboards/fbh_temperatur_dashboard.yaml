            layout: vertical

      # ── Grafik Heizkreis Temperaturen 24h ─────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Heizkreis Temperaturen - 24h
          show_states: true
          colorize_states: true
        graph_span: 24h
        now:
          show: true
          label: Jetzt
          color: "#ffffff"
        update_interval: 60s
        apex_config:
          chart:
            type: line
            height: 280
            toolbar:
              show: false
            animations:
              enabled: false
          stroke:
            curve: smooth
            width:
              - 2.0
              - 1.5
              - 1.5
              - 1.5
              - 1.5
              - 1.5
          dataLabels:
            enabled: false
          yaxis:
            min: 15
            max: 65
            labels:
              style:
                colors: "#9e9e9e"
                fontSize: "11px"
              formatter: |
                EVAL:function(val) { return val.toFixed(0) + ' °C'; }
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              style:
                colors: "#9e9e9e"
          grid:
            borderColor: "#333333"
            strokeDashArray: 2
          legend:
            show: true
            position: bottom
            labels:
              colors: "#9e9e9e"
          tooltip:
            theme: dark
            x:
              format: "HH:mm"
        series:
          - entity: sensor.ww_mitte_rl_ist_ww_oben_temperatur_3
            name: WW Oben
            color: "#ef4444"
            extend_to: now
          - entity: sensor.ww_mitte_rl_ist_ww_oben_temperatur
            name: WW Mitte
            color: "#f97316"
            extend_to: now
          - entity: sensor.ww_mitte_rl_ist_ww_oben_temperatur_2
            name: RL Ist
            color: "#3b82f6"
            extend_to: now
          - entity: sensor.16_waku_rl_hk_ii_vl_hk_ii_temperatur_3
            name: VL HK-II
            color: "#f59e0b"
            extend_to: now
          - entity: sensor.16_waku_rl_hk_ii_vl_hk_ii_temperatur_2
            name: RL HK-II
            color: "#06b6d4"
            extend_to: now
          - entity: sensor.16_waku_rl_hk_ii_vl_hk_ii_temperatur
            name: WaKü
            color: "#8b5cf6"
            extend_to: now

