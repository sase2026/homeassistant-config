            icon: mdi:thermometer
            icon_color: >
              {% set t = states('sensor.shelly1_8caab55d7ecf_temperatur') | float(0) %}
              {% if t >= 24 %}red{% elif t >= 21 %}green{% else %}blue{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Wohnen 1
            secondary: "{{ states('sensor.shelly1_8caab561c0b7_temperatur_2') | float(0) | round(1) }} °C"
