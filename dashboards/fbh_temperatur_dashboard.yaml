              {% if t >= 24 %}red{% elif t >= 21 %}green{% else %}blue{% endif %}
            layout: vertical
          - type: custom:mushroom-template-card
            primary: " "
            secondary: " "
            icon: mdi:minus
            icon_color: disabled
            layout: vertical

      # Obergeschoss
      - type: markdown
        content: "### Obergeschoss"
